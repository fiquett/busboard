<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>hearth</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0c10;
      color: #e2e8f0;
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: max(24px, env(safe-area-inset-top))
               max(24px, env(safe-area-inset-right))
               max(24px, env(safe-area-inset-bottom))
               max(24px, env(safe-area-inset-left));
    }
    .card {
      background: #12161e;
      border: 1px solid #1e2530;
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }
    .wordmark {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -1px;
      color: #f59e0b;
      margin-bottom: 6px;
    }
    .tagline {
      font-size: 13px;
      color: #475569;
      margin-bottom: 44px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 15px 20px;
      border-radius: 14px;
      border: 1px solid #1e2530;
      background: #1a1f2a;
      color: #e2e8f0;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
      margin-bottom: 12px;
    }
    .btn:hover, .btn:active { background: #1e2530; border-color: #2a3340; }
    .btn-google { border-color: #3b6bbf44; }
    .btn-google:hover { background: #141a2e; border-color: #3b6bbf88; }
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: #1e2530;
      font-size: 12px;
      color: #334155;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #1e2530;
    }
    /* Kiosk setup */
    #kiosk { display: none; }
    .code-box {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 6px;
      color: #f59e0b;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      margin: 8px 0 0;
    }
    #qrBox {
      background: #fff;
      border-radius: 12px;
      padding: 12px;
      display: inline-block;
      margin: 16px 0 8px;
    }
    #qrBox canvas, #qrBox img { display: block; }
    .hint {
      font-size: 13px;
      color: #475569;
      line-height: 1.6;
      margin-bottom: 16px;
    }
    .hint strong { color: #94a3b8; }
    .status {
      font-size: 13px;
      color: #64748b;
      margin-top: 12px;
      min-height: 18px;
    }
    .waiting::after {
      content: '';
      animation: dots 1.5s steps(3, end) infinite;
    }
    @keyframes dots {
      0%   { content: ''; }
      33%  { content: ' .'; }
      66%  { content: ' ..'; }
      100% { content: ' ...'; }
    }
    .activated { color: #4ade80 !important; }
    .back {
      display: inline-block;
      margin-top: 20px;
      font-size: 13px;
      color: #334155;
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
    }
    .back:hover { color: #64748b; }
    @media (max-width: 400px) {
      .card { padding: 36px 24px; border-radius: 0; border-left: none; border-right: none; }
      .code-box { font-size: 32px; }
    }
  </style>
</head>
<body>
<div class="card">
  <div class="wordmark">hearth</div>
  <div class="tagline">home dashboard</div>

  <div id="login">
    <a class="btn btn-google" href="/auth/google">
      <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Sign in with Google
    </a>

    <div class="divider">or</div>

    <button class="btn" onclick="setupKiosk()">
      <span>📺</span> Set up as kiosk display
    </button>
  </div>

  <div id="kiosk">
    <div class="hint">Scan to activate on your phone:</div>
    <div id="qrBox"><canvas id="qrCanvas"></canvas></div>
    <div class="code-box" id="code">···-···</div>
    <div class="hint" style="margin-top:8px;font-size:12px">
      or go to <strong>hearth.fiquett.com/activate</strong>
    </div>
    <div class="status waiting" id="status">Waiting for activation</div>
    <button class="back" onclick="cancelKiosk()">← back</button>
  </div>
</div>

<script>
let _deviceToken = null;
let _pollTimer   = null;
let _refreshTimer = null;

async function setupKiosk() {
  document.getElementById('login').style.display = 'none';
  document.getElementById('kiosk').style.display  = 'block';

  // Register an unactivated device
  const res  = await fetch('/api/device/register', { method: 'POST' });
  const data = await res.json();
  _deviceToken = data.token;
  localStorage.setItem('hearth_token', _deviceToken);

  await refreshCode();
  startPolling();
}

let _qr = null;
async function refreshCode() {
  try {
    const res  = await fetch('/api/invite', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + _deviceToken }
    });
    const data = await res.json();
    document.getElementById('code').textContent = data.code;
    // Render QR code
    const url = `https://hearth.fiquett.com/activate?code=${encodeURIComponent(data.code)}`;
    const box = document.getElementById('qrBox');
    box.innerHTML = '';
    new QRCode(box, { text: url, width: 180, height: 180,
                      colorDark: '#000000', colorLight: '#ffffff',
                      correctLevel: QRCode.CorrectLevel.M });
    // Refresh 30s before expiry
    clearTimeout(_refreshTimer);
    _refreshTimer = setTimeout(refreshCode, Math.max(0, (data.expires_in - 30) * 1000));
  } catch (e) {
    setTimeout(refreshCode, 10000);
  }
}

function startPolling() {
  clearInterval(_pollTimer);
  _pollTimer = setInterval(async () => {
    try {
      const res  = await fetch('/api/device', {
        headers: { 'Authorization': 'Bearer ' + _deviceToken }
      });
      const data = await res.json();
      if (data.activated) {
        clearInterval(_pollTimer);
        clearTimeout(_refreshTimer);
        if (data.new_token) localStorage.setItem('hearth_token', data.new_token);
        const el = document.getElementById('status');
        el.classList.remove('waiting');
        el.classList.add('activated');
        el.textContent = '✓ Activated! Loading…';
        setTimeout(() => window.location.replace('/'), 1200);
      }
    } catch (e) { /* ignore */ }
  }, 4000);
}

function cancelKiosk() {
  clearInterval(_pollTimer);
  clearTimeout(_refreshTimer);
  localStorage.removeItem('hearth_token');
  _deviceToken = null;
  document.getElementById('kiosk').style.display  = 'none';
  document.getElementById('login').style.display  = 'block';
  document.getElementById('code').textContent = '···-···';
  document.getElementById('status').textContent = 'Waiting for activation';
}

// Already logged in?
(function () {
  const t = localStorage.getItem('hearth_token');
  if (!t) return;
  try {
    const p = JSON.parse(atob(t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
    if (p.exp * 1000 > Date.now()) window.location.replace('/');
  } catch (e) { localStorage.removeItem('hearth_token'); }
})();
</script>
</body>
</html>
