<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>49 Bus</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a0c10">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="49 Bus">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0a0c10;
    --card:    #111318;
    --border:  #1e2230;
    --text:    #e8eaf0;
    --dim:     #5a6080;
    --north:   #4ade80;
    --south:   #60a5fa;
    --live:    #4ade80;
    --sched:   #f59e0b;
    --soon:    #ef4444;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    padding: 36px 28px 24px;
    gap: 16px;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .route-badge {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: .12em;
    color: var(--dim);
    text-transform: uppercase;
  }
  .header-right {
    text-align: right;
  }
  .clock {
    font-size: 3.9rem;
    font-weight: 300;
    letter-spacing: .04em;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .date {
    font-size: 1.35rem;
    color: var(--dim);
    margin-top: 3px;
    letter-spacing: .04em;
  }

  /* ── Weather card ── */
  .weather-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 20px;
    flex-shrink: 0;
  }
  .wx-row1 {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .wx-icon  { font-size: 2.8rem; line-height: 1; flex-shrink: 0; }
  .wx-main  { flex: 1; }
  .wx-temp  { font-size: 2.6rem; font-weight: 900; letter-spacing: -.02em; line-height: 1; }
  .wx-feels { font-size: 1.3rem; color: var(--dim); margin-top: 2px; }
  .wx-jacket {
    font-size: 1.35rem;
    font-weight: 700;
    padding: 8px 14px;
    border-radius: 20px;
    letter-spacing: .04em;
    flex-shrink: 0;
  }
  .wx-jacket.yes  { background: #1e3a5f; color: #60a5fa; border: 1px solid #60a5fa44; }
  .wx-jacket.maybe{ background: #2d2a10; color: #f59e0b; border: 1px solid #f59e0b44; }
  .wx-jacket.no   { background: #0f2d1a; color: #4ade80; border: 1px solid #4ade8044; }

  .wx-row2 {
    display: flex;
    gap: 0;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
    row-gap: 6px;
  }
  .wx-stat {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .wx-stat + .wx-stat {
    border-left: 1px solid var(--border);
    padding-left: 14px;
    margin-left: 14px;
  }
  .wx-stat-label {
    font-size: 1.05rem;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--dim);
  }
  .wx-stat-value {
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--text);
  }
  .wx-stat-value.aqi-good      { color: #4ade80; }
  .wx-stat-value.aqi-moderate  { color: #f59e0b; }
  .wx-stat-value.aqi-bad       { color: #ef4444; }

  /* ── Calendar strip ── */
  .cal-strip {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 20px;
    flex-shrink: 0;
    display: none; /* shown when events load */
  }
  .cal-strip.has-events { display: block; }
  .cal-label {
    font-size: 1.05rem;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 10px;
  }
  .cal-event {
    display: flex;
    align-items: baseline;
    gap: 12px;
    padding: 6px 0;
  }
  .cal-event + .cal-event { border-top: 1px solid var(--border); }
  .cal-time {
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--south);
    min-width: 60px;
    flex-shrink: 0;
  }
  .cal-title {
    font-size: 1.3rem;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── Grid ── */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    flex: 1;
    min-height: 0;
  }

  /* ── Direction card ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 22px 20px 18px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    position: relative;
    overflow: hidden;
    min-height: 0;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 18px 18px 0 0;
  }
  .card.north::before { background: var(--north); }
  .card.south::before { background: var(--south); }

  .dir-label {
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: .14em;
    text-transform: uppercase;
  }
  .card.north .dir-label { color: var(--north); }
  .card.south .dir-label { color: var(--south); }

  .dir-headsign {
    font-size: 1.2rem;
    color: var(--dim);
    margin-top: 3px;
  }

  /* ── Next bus (big) ── */
  .next-bus {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .next-mins {
    font-size: 10.2rem;
    font-weight: 900;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    letter-spacing: -.03em;
  }
  .next-mins.run    { color: var(--soon); }
  .next-mins.hustle { color: var(--sched); }
  .next-unit.run    { color: var(--soon); }
  .next-unit.hustle { color: var(--sched); }
  .card.north .next-mins:not(.run):not(.hustle) { color: var(--north); }
  .card.south .next-mins:not(.run):not(.hustle) { color: var(--south); }

  .next-unit {
    font-size: 2.3rem;
    font-weight: 400;
    color: var(--dim);
    padding-bottom: 6px;
  }

  .live-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--live);
    box-shadow: 0 0 6px var(--live);
    animation: pulse 2s ease-in-out infinite;
    margin-left: 6px;
    vertical-align: middle;
  }
  .live-dot.sched {
    background: var(--sched);
    box-shadow: 0 0 6px var(--sched);
    animation: none;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: .35; }
  }

  /* ── Upcoming ── */
  .upcoming {
    display: flex;
    flex-direction: column;
    gap: 6px;
    border-top: 1px solid var(--border);
    padding-top: 12px;
  }
  .upcoming-label {
    font-size: 1.18rem;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 2px;
  }
  .upcoming-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .up-mins {
    font-size: 2.8rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: var(--text);
    min-width: 80px;
  }
  .up-time {
    font-size: 1.3rem;
    color: var(--dim);
  }



  /* ── Footer ── */
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  .footer-left {
    font-size: 1.05rem;
    color: var(--dim);
    letter-spacing: .04em;
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--live);
    display: inline-block;
    margin-right: 5px;
  }
  .status-dot.error { background: var(--soon); }
  .last-updated {
    font-size: 1.05rem;
    color: var(--dim);
  }

  /* ── Error / shimmer ── */
  .error-msg {
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 1;
    font-size: 1rem;
    color: var(--dim);
    text-align: center;
    padding: 20px;
  }
  .shimmer {
    background: linear-gradient(90deg, var(--border) 25%, #252a3a 50%, var(--border) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 8px;
    height: 1em;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
</style>
</head>
<body>

<div class="header">
  <div class="route-badge">🚌 Route 49</div>
  <div class="header-right">
    <div class="clock" id="clock">—</div>
    <div class="date" id="date">—</div>
  </div>
</div>

<div class="weather-card">
  <div class="wx-row1">
    <div class="wx-icon" id="wxIcon">…</div>
    <div class="wx-main">
      <div class="wx-temp" id="wxTemp">—</div>
      <div class="wx-feels" id="wxFeels">feels like —</div>
    </div>
    <div class="wx-jacket" id="wxJacket">…</div>
  </div>
  <div class="wx-row2">
    <div class="wx-stat">
      <div class="wx-stat-label">High / Low</div>
      <div class="wx-stat-value" id="wxHiLo">—</div>
    </div>
    <div class="wx-stat">
      <div class="wx-stat-label">Rain chance</div>
      <div class="wx-stat-value" id="wxRain">—</div>
    </div>
    <div class="wx-stat">
      <div class="wx-stat-label">Sunset</div>
      <div class="wx-stat-value" id="wxSunset">—</div>
    </div>
    <div class="wx-stat">
      <div class="wx-stat-label">Air quality</div>
      <div class="wx-stat-value" id="wxAqi">—</div>
    </div>
    <div class="wx-stat">
      <div class="wx-stat-label">Moon</div>
      <div class="wx-stat-value" id="wxMoon">—</div>
    </div>
  </div>
</div>

<!-- Calendar strip — hidden until events load -->
<div class="cal-strip" id="calStrip">
  <div class="cal-label">📅 Coming up</div>
  <div id="calEvents"></div>
</div>

<div class="grid">
  <div class="card north" id="cardNorth">
    <div>
      <div class="dir-label">↑ Northbound</div>
      <div class="dir-headsign">U-District Station</div>
    </div>
    <div class="error-msg"><div class="shimmer" style="width:80px;height:4rem"></div></div>
  </div>
  <div class="card south" id="cardSouth">
    <div>
      <div class="dir-label">↓ Southbound</div>
      <div class="dir-headsign">Downtown Broadway</div>
    </div>
    <div class="error-msg"><div class="shimmer" style="width:80px;height:4rem"></div></div>
  </div>
</div>

<div class="footer">
  <div class="footer-left">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">Loading…</span>
  </div>
  <div class="last-updated" id="lastUpdated"></div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const STOPS = {
  north: { id: '1_11230', el: 'cardNorth', color: 'north' },
  south: { id: '1_11010', el: 'cardSouth', color: 'south' },
};
const API_KEY  = 'TEST';
const BASE_URL = 'https://api.pugetsound.onebusaway.org/api/where';
const ROUTE    = '49';
const REFRESH_MS = 30_000;

// Set your Google Calendar iCal URL here to enable the calendar strip.
// Make the calendar public, then: Google Calendar → Settings → [calendar] → Integrate → Public address in iCal format
// Use a CORS proxy or a Google Calendar API key approach.
// Leave empty to hide the calendar section.
const GCAL_API_KEY     = 'AIzaSyDNRa4mVWKWFEtvrJ2h4pLQ0mEP_FgsAxM';
const GCAL_CALENDAR_ID = 'c_4a337d01d4ef1946b524f5dc7b0373630d3dea059db5efb74d877b4720ac5280@group.calendar.google.com';

// ── Clock + Date ──────────────────────────────────────────────────────────────
const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function tickClock() {
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes();
  document.getElementById('clock').textContent =
    `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  document.getElementById('date').textContent =
    `${DAYS[now.getDay()]}, ${MONTHS[now.getMonth()]} ${now.getDate()}`;
}
setInterval(tickClock, 1000);
tickClock();

// ── Moon phase ────────────────────────────────────────────────────────────────
function moonPhase() {
  // Known new moon: Jan 6 2000 18:14 UTC
  const known = new Date('2000-01-06T18:14:00Z');
  const cycle = 29.53059;
  const elapsed = (Date.now() - known.getTime()) / 86400000;
  const phase = ((elapsed % cycle) + cycle) % cycle;
  const phases = [
    [0,   '🌑', 'New'],
    [1.85,'🌒', 'Waxing Crescent'],
    [5.53,'🌓', 'First Quarter'],
    [9.22,'🌔', 'Waxing Gibbous'],
    [12.9,'🌕', 'Full'],
    [16.6,'🌖', 'Waning Gibbous'],
    [20.3,'🌗', 'Last Quarter'],
    [24.0,'🌘', 'Waning Crescent'],
    [27.7,'🌑', 'New'],
  ];
  for (let i = phases.length - 1; i >= 0; i--) {
    if (phase >= phases[i][0]) return { emoji: phases[i][1], name: phases[i][2] };
  }
  return { emoji: '🌑', name: 'New' };
}

function renderMoon() {
  const { emoji, name } = moonPhase();
  document.getElementById('wxMoon').textContent = `${emoji} ${name}`;
}
renderMoon();

// ── Bus fetch ─────────────────────────────────────────────────────────────────
async function fetchStop(stopId) {
  const url = `${BASE_URL}/arrivals-and-departures-for-stop/${stopId}.json`
            + `?key=${API_KEY}&minutesBefore=0&minutesAfter=90`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const d = await r.json();
  const now = d.currentTime;
  return (d.data.entry.arrivalsAndDepartures || [])
    .filter(e => e.routeShortName === ROUTE)
    .map(e => {
      const predT = e.predicted && e.predictedDepartureTime ? e.predictedDepartureTime : 0;
      const t = predT || e.scheduledDepartureTime;
      return {
        mins:    Math.round((t - now) / 60000),
        time:    new Date(t).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',hour12:false}),
        live:    !!(predT),
        headsign: e.tripHeadsign,
      };
    })
    .filter(e => e.mins >= 0);
}

function renderCard(elId, colorClass, arrivals) {
  const card = document.getElementById(elId);
  const dirLabel   = colorClass === 'north' ? '↑ Northbound' : '↓ Southbound';
  const dirDefault = colorClass === 'north' ? 'U-District Station' : 'Downtown Broadway';

  if (!arrivals || !arrivals.length) {
    card.innerHTML = `
      <div><div class="dir-label">${dirLabel}</div><div class="dir-headsign">${dirDefault}</div></div>
      <div class="error-msg" style="color:var(--dim)">No buses in next 90 min</div>`;
    return;
  }

  const next     = arrivals[0];
  const minsText = next.mins <= 0 ? 'Now' : String(next.mins);
  const urgency  = next.mins <= 1 ? 'run' : next.mins <= 2 ? 'hustle' : '';

  const upcomingRows = arrivals.slice(1, 4).map(a => `
    <div class="upcoming-row">
      <div class="up-mins">${a.mins < 2 ? 'Now' : a.mins + ' min'}</div>
      <div class="up-time">${a.time}${a.live ? '' : ' ·sched'}</div>
    </div>`).join('');

  card.innerHTML = `
    <div>
      <div class="dir-label">${dirLabel}</div>
      <div class="dir-headsign">${next.headsign || dirDefault}</div>
    </div>
    <div class="next-bus">
      <div class="next-mins ${urgency}">${minsText}</div>
      ${minsText !== 'Now' ? `<div class="next-unit ${urgency}">${urgency === 'run' ? '🏃' : urgency === 'hustle' ? '🚶' : 'min'}</div>` : ''}
      <span class="live-dot ${next.live ? '' : 'sched'}" title="${next.live ? 'Live GPS' : 'Scheduled'}"></span>
    </div>
    ${upcomingRows ? `<div class="upcoming"><div class="upcoming-label">Then</div>${upcomingRows}</div>` : ''}`;
}

let failCount = 0;
const FAIL_THRESHOLD = 3;

async function refresh() {
  try {
    const [north, south] = await Promise.all([fetchStop(STOPS.north.id), fetchStop(STOPS.south.id)]);
    renderCard('cardNorth', 'north', north);
    renderCard('cardSouth', 'south', south);
    failCount = 0;
    document.getElementById('statusDot').className   = 'status-dot';
    document.getElementById('statusText').textContent = 'Live';
    const t = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
    document.getElementById('lastUpdated').textContent = `Updated ${t}`;
  } catch (e) {
    failCount++;
    if (failCount >= FAIL_THRESHOLD) {
      document.getElementById('statusDot').className   = 'status-dot error';
      document.getElementById('statusText').textContent = 'Offline — retrying…';
    }
    console.error('Bus fetch error:', e);
  }
}
refresh();
setInterval(refresh, REFRESH_MS);

// ── Weather ───────────────────────────────────────────────────────────────────
const WMO = {
  0:  ['☀️','Clear'],   1: ['🌤','Mostly clear'],  2: ['⛅️','Partly cloudy'],
  3:  ['☁️','Overcast'],45: ['🌫','Foggy'],         48: ['🌫','Freezing fog'],
  51: ['🌦','Light drizzle'], 53: ['🌧','Drizzle'], 55: ['🌧','Heavy drizzle'],
  61: ['🌧','Light rain'],    63: ['🌧','Rain'],     65: ['🌧','Heavy rain'],
  71: ['🌨','Light snow'],    73: ['❄️','Snow'],     75: ['❄️','Heavy snow'],
  80: ['🌦','Rain showers'],  81: ['🌧','Showers'],  82: ['⛈','Heavy showers'],
  95: ['⛈','Thunderstorm'],   99: ['⛈','Severe storm'],
};

async function fetchWeather() {
  const [wxRes, aqiRes] = await Promise.all([
    fetch('https://api.open-meteo.com/v1/forecast'
      + '?latitude=47.6296&longitude=-122.3206'
      + '&current=temperature_2m,apparent_temperature,precipitation,weather_code,wind_speed_10m,wind_gusts_10m'
      + '&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,sunset'
      + '&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch'
      + '&timezone=America%2FLos_Angeles'),
    fetch('https://air-quality-api.open-meteo.com/v1/air-quality'
      + '?latitude=47.6296&longitude=-122.3206&current=us_aqi'),
  ]);

  const wx  = await wxRes.json();
  const aqi = await aqiRes.json();
  const c   = wx.current;
  const d   = wx.daily;

  const [icon, desc] = WMO[c.weather_code] || ['🌡','Unknown'];
  const temp   = Math.round(c.temperature_2m);
  const feels  = Math.round(c.apparent_temperature);
  const wind   = Math.round(c.wind_speed_10m);
  const gusts  = Math.round(c.wind_gusts_10m);
  const rain   = c.precipitation > 0;
  const hi     = Math.round(d.temperature_2m_max[0]);
  const lo     = Math.round(d.temperature_2m_min[0]);
  const rainPct = d.precipitation_probability_max[0];
  const sunsetRaw = d.sunset[0]; // e.g. "2026-03-21T19:42"
  const sunsetTime = new Date(sunsetRaw).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', hour12:false});
  const aqiVal = Math.round(aqi.current.us_aqi);

  document.getElementById('wxIcon').textContent  = icon;
  document.getElementById('wxTemp').textContent  = `${temp}°F`;
  document.getElementById('wxFeels').textContent = `feels like ${feels}°F  ·  ${desc}${rain ? ' 🌂' : ''}`;

  const windStr = gusts > wind + 5 ? `💨 ${wind} mph gusts ${gusts}` : wind > 5 ? `💨 ${wind} mph` : 'Calm';
  document.getElementById('wxHiLo').textContent   = `${hi}° / ${lo}°`;
  document.getElementById('wxRain').textContent   = `${rainPct}%`;
  document.getElementById('wxSunset').textContent = sunsetTime;

  const aqiEl = document.getElementById('wxAqi');
  let aqiLabel, aqiClass;
  if      (aqiVal <= 50)  { aqiLabel = `${aqiVal} Good`;      aqiClass = 'aqi-good'; }
  else if (aqiVal <= 100) { aqiLabel = `${aqiVal} Moderate`;  aqiClass = 'aqi-moderate'; }
  else                    { aqiLabel = `${aqiVal} Poor`;       aqiClass = 'aqi-bad'; }
  aqiEl.textContent = aqiLabel;
  aqiEl.className   = `wx-stat-value ${aqiClass}`;

  // Jacket logic
  const jacket = document.getElementById('wxJacket');
  if (feels < 45 || rain || gusts > 25) {
    jacket.textContent = '🧥 Jacket'; jacket.className = 'wx-jacket yes';
  } else if (feels < 58) {
    jacket.textContent = '🤔 Maybe';  jacket.className = 'wx-jacket maybe';
  } else {
    jacket.textContent = '✓ No jacket'; jacket.className = 'wx-jacket no';
  }
}
fetchWeather();
setInterval(fetchWeather, 10 * 60 * 1000);

// ── Calendar ──────────────────────────────────────────────────────────────────
async function fetchCalendar() {
  if (!GCAL_API_KEY || !GCAL_CALENDAR_ID) return;
  try {
    const now    = new Date().toISOString();
    const dayEnd = new Date(); dayEnd.setHours(23, 59, 59);
    const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(GCAL_CALENDAR_ID)}/events`
      + `?key=${GCAL_API_KEY}&timeMin=${now}&timeMax=${dayEnd.toISOString()}`
      + `&maxResults=4&orderBy=startTime&singleEvents=true`;
    const r = await fetch(url);
    const d = await r.json();
    const events = (d.items || []).filter(e => e.status !== 'cancelled');
    if (!events.length) return;

    document.getElementById('calStrip').classList.add('has-events');
    document.getElementById('calEvents').innerHTML = events.map(e => {
      const start = e.start.dateTime ? new Date(e.start.dateTime) : null;
      const timeStr = start
        ? start.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', hour12:false})
        : 'All day';
      return `<div class="cal-event">
        <div class="cal-time">${timeStr}</div>
        <div class="cal-title">${e.summary || 'Event'}</div>
      </div>`;
    }).join('');
  } catch(e) {
    console.error('Calendar fetch error:', e);
  }
}
fetchCalendar();
setInterval(fetchCalendar, 15 * 60 * 1000);


</script>
</body>
</html>
